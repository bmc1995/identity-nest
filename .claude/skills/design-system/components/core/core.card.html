<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{ padding:24px; }
  .row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:18px; }
  .sec{ font-family:var(--font-mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--text-faint); margin:0 0 10px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
</style></head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { Button, IconButton, Badge, Tag, Avatar, Card } = window.IDNestDesignSystem_c7f3f6;
const Plus = () => <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M8 3v10M3 8h10"/></svg>;
const Gear = () => <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="9" cy="9" r="2.4"/><path d="M9 1.5v2M9 14.5v2M1.5 9h2M14.5 9h2M3.8 3.8l1.4 1.4M12.8 12.8l1.4 1.4M14.2 3.8l-1.4 1.4M5.2 12.8l-1.4 1.4"/></svg>;
const Copy = () => <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="6" y="6" width="9" height="9" rx="2"/><path d="M12 6V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/></svg>;

function Demo(){
  return (
    <div>
      <p className="sec">Buttons</p>
      <div className="row">
        <Button variant="primary">Sign in</Button>
        <Button variant="secondary">Cancel</Button>
        <Button variant="ghost">Docs</Button>
        <Button variant="danger">Revoke</Button>
        <Button variant="primary" mono iconLeft={<Plus/>}>npm i idnest</Button>
        <Button variant="secondary" loading>Saving</Button>
      </div>
      <div className="row">
        <Button size="sm">Small</Button>
        <Button size="md">Medium</Button>
        <Button size="lg">Large</Button>
        <IconButton label="Settings"><Gear/></IconButton>
        <IconButton variant="solid" label="Copy"><Copy/></IconButton>
        <IconButton variant="accent" label="Add"><Plus/></IconButton>
      </div>

      <p className="sec">Badges &amp; tags</p>
      <div className="row">
        <Badge tone="success" dot>active</Badge>
        <Badge tone="warning">expiring</Badge>
        <Badge tone="danger" dot>revoked</Badge>
        <Badge tone="accent" solid>production</Badge>
        <Badge tone="info">OIDC</Badge>
        <Badge tone="neutral">staging</Badge>
        <Tag onRemove={()=>{}}>openid</Tag>
        <Tag onRemove={()=>{}}>profile</Tag>
        <Tag>read:users</Tag>
      </div>

      <p className="sec">Avatars</p>
      <div className="row">
        <Avatar name="Dana Reyes" status="online"/>
        <Avatar name="Mara Lin" size="sm"/>
        <Avatar name="Acme Inc" round/>
        <Avatar name="Theo Park" size="lg" status="away"/>
      </div>

      <p className="sec">Cards</p>
      <div className="grid2">
        <Card title="Token lifetime" actions={<IconButton size="sm" label="Edit"><Gear/></IconButton>}>
          Access tokens expire after 1 hour. Refresh rotation is on.
        </Card>
        <Card interactive accent padded>
          <strong style={{color:'var(--text-strong)',fontFamily:'var(--font-display)'}}>Recommended</strong>
          <div style={{color:'var(--text-muted)',fontSize:13,marginTop:6}}>Auto-rotate signing keys every 90 days.</div>
        </Card>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
