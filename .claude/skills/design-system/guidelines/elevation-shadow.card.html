<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation & shadow" subtitle="Subtle warm-black shadows; accent glow for primary only" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css">
<style>.els{display:flex;gap:20px;flex-wrap:wrap;padding:8px 4px}.el{width:96px;height:60px;background:var(--surface-2);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body><div class="card-wrap">
  <div class="els">
    <div class="el" style="box-shadow:var(--shadow-sm)">sm</div>
    <div class="el" style="box-shadow:var(--shadow-md)">md</div>
    <div class="el" style="box-shadow:var(--shadow-lg)">lg</div>
    <div class="el" style="box-shadow:var(--shadow-xl)">xl</div>
    <div class="el" style="box-shadow:var(--glow-accent);background:var(--accent);color:var(--text-on-accent)">glow</div>
  </div>
  <span class="lbl">sm cards · md popovers · lg/xl dialogs & menus · glow on primary CTA / live state only</span>
</div></body></html>
