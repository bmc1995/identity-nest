<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Gently rounded — never bubbly except pills" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css">
<style>.rad{display:flex;gap:14px;flex-wrap:wrap}.rb{width:72px}.rb .b{height:56px;background:var(--surface-2);border:1px solid var(--border-strong);border-bottom:2px solid var(--accent)}.rb span{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);display:block;margin-top:6px}</style></head>
<body><div class="card-wrap">
  <div class="rad">
    <div class="rb"><div class="b" style="border-radius:4px"></div><span>xs · 4</span></div>
    <div class="rb"><div class="b" style="border-radius:6px"></div><span>sm · 6</span></div>
    <div class="rb"><div class="b" style="border-radius:8px"></div><span>md · 8</span></div>
    <div class="rb"><div class="b" style="border-radius:12px"></div><span>lg · 12</span></div>
    <div class="rb"><div class="b" style="border-radius:16px"></div><span>xl · 16</span></div>
    <div class="rb"><div class="b" style="border-radius:22px"></div><span>2xl · 22</span></div>
    <div class="rb"><div class="b" style="border-radius:999px"></div><span>pill</span></div>
  </div>
  <span class="lbl">Cards lg/xl · inputs & buttons md · badges/pills pill · modals 2xl</span>
</div></body></html>
