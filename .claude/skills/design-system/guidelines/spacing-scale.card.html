<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="4px base unit — the rhythm of every layout" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css">
<style>.bar{display:flex;align-items:center;gap:10px}.bar i{display:block;height:14px;background:var(--accent);border-radius:2px}.bar .v{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);width:74px}</style></head>
<body><div class="card-wrap" style="gap:7px">
  <div class="bar"><span class="v">1 · 4px</span><i style="width:4px"></i></div>
  <div class="bar"><span class="v">2 · 8px</span><i style="width:8px"></i></div>
  <div class="bar"><span class="v">3 · 12px</span><i style="width:12px"></i></div>
  <div class="bar"><span class="v">4 · 16px</span><i style="width:16px"></i></div>
  <div class="bar"><span class="v">6 · 24px</span><i style="width:24px"></i></div>
  <div class="bar"><span class="v">8 · 32px</span><i style="width:32px"></i></div>
  <div class="bar"><span class="v">12 · 48px</span><i style="width:48px"></i></div>
  <div class="bar"><span class="v">16 · 64px</span><i style="width:64px"></i></div>
</div></body></html>
