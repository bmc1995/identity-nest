<!-- @dsCard group="Colors" viewport="700x150" name="Cream & Amber" subtitle="Light ink / paper tones and the warm secondary" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-wrap">
  <div class="swrow">
    <div class="sw"><div class="chip" style="background:var(--raw-cream-50)"></div><span class="nm">cream-50</span><span class="hx">#FBF6EE</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-cream-200)"></div><span class="nm">cream-200</span><span class="hx">#EFE7DC</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-cream-300)"></div><span class="nm">cream-300</span><span class="hx">#DCCDBA</span></div>
    <div class="sw" style="margin-left:18px"><div class="chip" style="background:var(--raw-amber-300)"></div><span class="nm">amber-300</span><span class="hx">#F6C177</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-amber-400)"></div><span class="nm">amber-400</span><span class="hx">#F2A65A</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-amber-500)"></div><span class="nm">amber-500</span><span class="hx">#E8923C</span></div>
  </div>
  <span class="lbl">text-strong = cream-50 · text-body = cream-200 · --accent-2 = amber-400</span>
</div></body></html>
