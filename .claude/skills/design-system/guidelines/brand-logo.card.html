<!-- @dsCard group="Brand" viewport="700x180" name="Logo mark" subtitle="A fingerprint nested inside the egg — identity, kept safe" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css">
<style>.marks{display:flex;gap:20px;align-items:center;flex-wrap:wrap}.mc{display:flex;flex-direction:column;align-items:center;gap:8px}.mc img{width:72px;height:72px}.mc .on{padding:14px;border-radius:var(--radius-lg)}.mc span{font-family:var(--font-mono);font-size:10px;color:var(--text-faint)}</style></head>
<body><div class="card-wrap">
  <div class="marks">
    <div class="mc"><div class="on" style="background:var(--surface-1)"><img src="../assets/idnest-mark.svg"></div><span>on dark</span></div>
    <div class="mc"><div class="on" style="background:var(--raw-cream-50)"><img src="../assets/idnest-mark-light.svg"></div><span>on light</span></div>
    <div class="mc"><div class="on" style="background:var(--surface-1)"><img src="../assets/idnest-appicon.svg"></div><span>app icon</span></div>
  </div>
  <span class="lbl">Egg = a protected nest · fingerprint = the identity it holds. Clay + cream, always.</span>
</div></body></html>
