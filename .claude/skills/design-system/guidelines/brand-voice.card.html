<!-- @dsCard group="Brand" viewport="700x200" name="Voice in one line" subtitle="How ID Nest sounds: calm, plain, a little dry" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css">
<style>.vo{display:grid;grid-template-columns:1fr 1fr;gap:12px}.vc{border-radius:var(--radius-lg);padding:13px 15px;border:1px solid var(--border-subtle)}.vc .h{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px}.vc p{margin:0;font-size:14px;color:var(--text-body)}.yes .h{color:var(--success)}.no .h{color:var(--danger)}.no p{color:var(--text-muted);text-decoration:line-through;text-decoration-color:var(--border-strong)}</style></head>
<body><div class="card-wrap">
  <div class="vo">
    <div class="vc yes" style="background:var(--success-soft)"><div class="h">We say</div><p>Auth that feels like home.</p></div>
    <div class="vc no" style="background:var(--danger-soft)"><div class="h">Not</div><p>Enterprise-grade synergistic IAM solutions.</p></div>
    <div class="vc yes" style="background:var(--success-soft)"><div class="h">We say</div><p>Ship login before lunch.</p></div>
    <div class="vc no" style="background:var(--danger-soft)"><div class="h">Not</div><p>Accelerate your identity journey today!</p></div>
  </div>
  <span class="lbl">Plain words, second person, lowercase confidence. No hype, no jargon, occasional dry wit.</span>
</div></body></html>
