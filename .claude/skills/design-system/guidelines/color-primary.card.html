<!-- @dsCard group="Colors" viewport="700x150" name="Clay — primary accent" subtitle="Terracotta accent ramp + semantic accent aliases" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card-wrap">
  <div class="swrow">
    <div class="sw"><div class="chip" style="background:var(--raw-clay-300)"></div><span class="nm">clay-300</span><span class="hx">#F0916B</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-clay-400)"></div><span class="nm">clay-400</span><span class="hx">#E5703F</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-clay-500);box-shadow:var(--glow-accent)"></div><span class="nm">clay-500 ◆</span><span class="hx">#D9572E</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-clay-600)"></div><span class="nm">clay-600</span><span class="hx">#C7491F</span></div>
    <div class="sw"><div class="chip" style="background:var(--raw-clay-700)"></div><span class="nm">clay-700</span><span class="hx">#A53C1A</span></div>
  </div>
  <span class="lbl">--accent (500) · --accent-hover (400) · --accent-press (600) · ◆ = brand primary</span>
</div></body></html>
