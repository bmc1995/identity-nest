<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Test SPA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a1a;
      min-height: 100vh;
    }
    .topbar {
      background: #111;
      color: #fff;
      padding: 0.75rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .topbar button {
      background: none;
      border: 1px solid #555;
      color: #ccc;
      padding: 0.35rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .topbar button:hover { border-color: #fff; color: #fff; }
    .container {
      max-width: 640px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 2rem;
      margin-bottom: 1rem;
    }
    h2 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .login-btn {
      display: inline-flex;
      align-items: center;
      padding: 0.65rem 2rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
    }
    .login-btn:hover { background: #333; }
    .error-box {
      background: #fee;
      color: #c00;
      padding: 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .token-section { margin-bottom: 1.5rem; }
    .token-section h3 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #888;
      margin-bottom: 0.5rem;
    }
    pre {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 1rem;
      font-size: 0.8rem;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: 600;
      color: #666;
    }
    .user-details h3 { font-size: 1rem; color: #1a1a1a; margin-bottom: 0.15rem; }
    .user-details p { font-size: 0.85rem; color: #888; }
    .badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .actions { display: flex; gap: 0.5rem; margin-top: 1rem; }
    .actions button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .actions button:hover { background: #f5f5f5; }
    .loading { text-align: center; padding: 2rem; color: #888; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>Test SPA</h1>
    <button id="logout-btn" style="display:none" onclick="logout()">Sign out</button>
  </div>
  <div class="container" id="app"></div>

  <script>
    const CONFIG = {
      clientId: 'dashboard-spa',
      issuer: 'http://localhost:3000',
      redirectUri: 'http://localhost:4200/auth/callback',
      scopes: 'openid profile email',
    };

    // --- PKCE helpers ---

    function generateRandomString(length) {
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      return base64UrlEncode(array);
    }

    function base64UrlEncode(buffer) {
      const bytes = buffer instanceof Uint8Array ? buffer : new Uint8Array(buffer);
      let binary = '';
      for (const b of bytes) binary += String.fromCharCode(b);
      return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function generateCodeChallenge(verifier) {
      const encoder = new TextEncoder();
      const data = encoder.encode(verifier);
      const digest = await crypto.subtle.digest('SHA-256', data);
      return base64UrlEncode(digest);
    }

    // --- Token storage ---

    function getTokens() {
      const raw = localStorage.getItem('tokens');
      return raw ? JSON.parse(raw) : null;
    }

    function setTokens(tokens) {
      localStorage.setItem('tokens', JSON.stringify(tokens));
    }

    function clearTokens() {
      localStorage.removeItem('tokens');
      localStorage.removeItem('pkce_verifier');
      localStorage.removeItem('oauth_state');
    }

    function decodeJwt(token) {
      try {
        const parts = token.split('.');
        if (parts.length !== 3) return null;
        const payload = atob(parts[1].replace(/-/g, '+').replace(/_/g, '/'));
        return JSON.parse(payload);
      } catch {
        return null;
      }
    }

    // --- Auth flow ---

    async function login() {
      const state = generateRandomString(32);
      const codeVerifier = generateRandomString(32);
      const codeChallenge = await generateCodeChallenge(codeVerifier);

      localStorage.setItem('pkce_verifier', codeVerifier);
      localStorage.setItem('oauth_state', state);

      const params = new URLSearchParams({
        response_type: 'code',
        client_id: CONFIG.clientId,
        redirect_uri: CONFIG.redirectUri,
        scope: CONFIG.scopes,
        state: state,
        code_challenge: codeChallenge,
        code_challenge_method: 'S256',
      });

      window.location.href = `${CONFIG.issuer}/oidc/authorize?${params}`;
    }

    async function handleCallback() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const state = params.get('state');
      const error = params.get('error');
      const errorDescription = params.get('error_description');

      if (error) {
        renderError(`Authorization error: ${error}`, errorDescription);
        return;
      }

      if (!code) {
        renderError('No authorization code received');
        return;
      }

      // Verify state
      const savedState = localStorage.getItem('oauth_state');
      if (state !== savedState) {
        renderError('State mismatch — possible CSRF attack');
        return;
      }

      const codeVerifier = localStorage.getItem('pkce_verifier');
      if (!codeVerifier) {
        renderError('Missing PKCE code verifier');
        return;
      }

      renderLoading('Exchanging authorization code...');

      try {
        const response = await fetch(`${CONFIG.issuer}/oidc/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            code: code,
            redirect_uri: CONFIG.redirectUri,
            client_id: CONFIG.clientId,
            code_verifier: codeVerifier,
          }),
        });

        if (!response.ok) {
          const err = await response.json();
          renderError(`Token exchange failed: ${err.error}`, err.error_description);
          return;
        }

        const tokens = await response.json();
        setTokens(tokens);

        // Clean up URL
        window.history.replaceState({}, '', '/');
        renderAuthenticated(tokens);
      } catch (err) {
        renderError('Token exchange failed', err.message);
      }
    }

    async function fetchUserInfo(accessToken) {
      try {
        const response = await fetch(`${CONFIG.issuer}/oidc/userinfo`, {
          headers: { Authorization: `Bearer ${accessToken}` },
        });
        if (!response.ok) return null;
        return await response.json();
      } catch {
        return null;
      }
    }

    async function refreshAccessToken() {
      const tokens = getTokens();
      if (!tokens?.refresh_token) {
        renderError('No refresh token available');
        return;
      }

      try {
        const response = await fetch(`${CONFIG.issuer}/oidc/token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'refresh_token',
            refresh_token: tokens.refresh_token,
            client_id: CONFIG.clientId,
          }),
        });

        if (!response.ok) {
          const err = await response.json();
          renderError(`Token refresh failed: ${err.error}`, err.error_description);
          return;
        }

        const newTokens = await response.json();
        setTokens(newTokens);
        renderAuthenticated(newTokens);
      } catch (err) {
        renderError('Token refresh failed', err.message);
      }
    }

    function logout() {
      clearTokens();
      render();
    }

    // --- Rendering ---

    function renderLoading(message) {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <div class="loading">${escapeHtml(message || 'Loading...')}</div>
        </div>`;
    }

    function renderError(title, detail) {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <div class="error-box">
            <strong>${escapeHtml(title)}</strong>
            ${detail ? `<br>${escapeHtml(detail)}` : ''}
          </div>
          <button class="login-btn" onclick="login()">Try again</button>
        </div>`;
    }

    async function renderAuthenticated(tokens) {
      document.getElementById('logout-btn').style.display = '';

      const idClaims = tokens.id_token ? decodeJwt(tokens.id_token) : null;
      const accessClaims = decodeJwt(tokens.access_token);
      const userInfo = await fetchUserInfo(tokens.access_token);

      const initials = (idClaims?.name || userInfo?.name || idClaims?.sub || '?')
        .split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

      document.getElementById('app').innerHTML = `
        <div class="card">
          <span class="badge">Authenticated</span>
          <div class="user-info">
            <div class="avatar">${escapeHtml(initials)}</div>
            <div class="user-details">
              <h3>${escapeHtml(idClaims?.name || userInfo?.name || 'Unknown User')}</h3>
              <p>${escapeHtml(idClaims?.email || userInfo?.email || idClaims?.sub || '')}</p>
            </div>
          </div>
          <div class="actions">
            <button onclick="refreshAccessToken()">Refresh Token</button>
            <button onclick="fetchAndShowUserInfo()">Fetch UserInfo</button>
          </div>
        </div>

        ${idClaims ? `
        <div class="card">
          <div class="token-section">
            <h3>ID Token Claims</h3>
            <pre>${escapeHtml(JSON.stringify(idClaims, null, 2))}</pre>
          </div>
        </div>` : ''}

        <div class="card">
          <div class="token-section">
            <h3>Access Token Claims</h3>
            <pre>${escapeHtml(JSON.stringify(accessClaims, null, 2))}</pre>
          </div>
        </div>

        <div class="card">
          <div class="token-section">
            <h3>Raw Token Response</h3>
            <pre>${escapeHtml(JSON.stringify(tokens, null, 2))}</pre>
          </div>
        </div>

        ${userInfo ? `
        <div class="card">
          <div class="token-section">
            <h3>UserInfo Response</h3>
            <pre id="userinfo-display">${escapeHtml(JSON.stringify(userInfo, null, 2))}</pre>
          </div>
        </div>` : ''}
      `;
    }

    async function fetchAndShowUserInfo() {
      const tokens = getTokens();
      if (!tokens) return;
      const userInfo = await fetchUserInfo(tokens.access_token);
      let el = document.getElementById('userinfo-display');
      if (el) {
        el.textContent = JSON.stringify(userInfo, null, 2);
      } else {
        // Re-render with updated userinfo
        renderAuthenticated(tokens);
      }
    }

    function renderUnauthenticated() {
      document.getElementById('logout-btn').style.display = 'none';
      document.getElementById('app').innerHTML = `
        <div class="card">
          <h2>Welcome</h2>
          <p class="subtitle">
            Sign in with the identity provider to test the OAuth 2.0 / OIDC authorization code flow with PKCE.
          </p>
          <button class="login-btn" onclick="login()">Sign in</button>
        </div>
        <div class="card">
          <div class="token-section">
            <h3>Configuration</h3>
            <pre>${escapeHtml(JSON.stringify(CONFIG, null, 2))}</pre>
          </div>
        </div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // --- Router ---

    function render() {
      const path = window.location.pathname;

      if (path === '/auth/callback') {
        handleCallback();
        return;
      }

      const tokens = getTokens();
      if (tokens) {
        renderAuthenticated(tokens);
      } else {
        renderUnauthenticated();
      }
    }

    render();
  </script>
</body>
</html>
