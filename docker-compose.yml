services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: identity
      POSTGRES_PASSWORD: identity
      POSTGRES_DB: identity
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: identity
      DATABASE_PASSWORD: identity
      DATABASE_NAME: identity
      OIDC_ISSUER: ${OIDC_ISSUER:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-idp_session}
      SESSION_TTL_MS: ${SESSION_TTL_MS:-3600000}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-cookie-secret-change-in-production}
      TENANT_ENCRYPTION_KEY: ${TENANT_ENCRYPTION_KEY:-dev-key-change-in-production}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
